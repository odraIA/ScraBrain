# ==============================================================================
# docker-compose.yml — Lanzamiento seguro en servidor compartido
# ==============================================================================
# Uso:
#   # Primera vez (construye imagen + precalcula stats + entrena):
#   docker compose up --build
#
#   # Ejecuciones posteriores (stats ya cacheadas, salta precompute rápido):
#   docker compose up
#
#   # Solo precalcular stats (sin training):
#   docker compose up precompute_stats
#
#   # Solo entrenar (si stats ya están calculadas):
#   docker compose up meg_training_job
#
#   # Ver logs del training en tiempo real:
#   docker compose logs -f meg_training_job
#
#   # Parar limpiamente (guarda checkpoint antes de morir):
#   docker compose down
#
# Requisitos del host:
#   - nvidia-container-toolkit instalado
#   - docker >= 23.0
#   - docker compose >= 2.0
# ==============================================================================

# Bloque de configuración reutilizable (ancla YAML)
# Evita duplicar las 30+ líneas comunes entre precompute y training
x-meg-base: &meg-base
  build:
    context: .
    dockerfile: Dockerfile
    cache_from:
      - type=local,src=/tmp/.buildx-cache
    args:
      BUILDKIT_INLINE_CACHE: "1"

  # ── Volúmenes compartidos entre ambos servicios ──────────────────────────────
  # CRÍTICO: libribrain_data en rw porque precompute escribe en los H5,
  # y training necesita leerlos después.
  volumes:
    - ./libribrain_data:/workspace/libribrain_data:rw
    - ./checkpoints:/workspace/checkpoints:rw
    - ./results:/workspace/results:rw
    - ./logs:/workspace/logs:rw
    - ./hf_cache:/workspace/cache:rw

  # ── Variables de entorno comunes ─────────────────────────────────────────────
  environment:
    - HF_TOKEN=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
    - HF_DATASET=pnpl/LibriBrain
    - HF_HOME=/workspace/cache/huggingface
    - XDG_CACHE_HOME=/workspace/cache
    - MPLCONFIGDIR=/workspace/cache/matplotlib    # ← fix warning de matplotlib
    - PNPL_CACHE_DIR=/workspace/cache/pnpl        # ← fix warning de pnpl
    - UID=${UID:-1000}
    - GID=${GID:-1000}

  # ── Seguridad ────────────────────────────────────────────────────────────────
  security_opt:
    - no-new-privileges:true
  read_only: false
  cap_drop:
    - ALL
  cap_add:
    - SYS_PTRACE

  # ── Logging de Docker ────────────────────────────────────────────────────────
  logging:
    driver: "json-file"
    options:
      max-size: "500m"
      max-file: "5"

  user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"


services:

  # ============================================================================
  # SERVICIO 1: Precálculo de stats de normalización
  # ============================================================================
  # PROPÓSITO: Escribe las stats (mean/std por canal) en los H5 de forma
  # secuencial antes de que DDP arranque. Evita el BlockingIOError (errno=11)
  # que ocurre cuando ambos procesos DDP intentan abrir los mismos H5 en "r+".
  #
  # - Usa solo 1 GPU (no necesita DDP)
  # - Termina sola cuando acaba (no es un servicio persistente)
  # - meg_training_job espera a que esta termine correctamente
  # - Si las stats ya están cacheadas, pnpl las detecta y termina rápido (~1min)
  # ============================================================================
  precompute_stats:
    <<: *meg-base
    container_name: meg_precompute_stats
    entrypoint: ["python"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1            # Solo 1 GPU — proceso secuencial, no DDP
              capabilities: [gpu]

    # Ejecuta precompute_stats.py para train+validation+test
    command: >
      /workspace/precompute_stats.py
        --data_path /workspace/libribrain_data
        --task phoneme

    # Si falla el precompute, no lanzar el training (evitar el lock error)
    restart: "no"

    # IPC no necesario aquí (sin workers paralelos)
    ipc: "private"

    network_mode: host

    stop_grace_period: 30s


  # ============================================================================
  # SERVICIO 2: Entrenamiento DDP multi-GPU
  # ============================================================================
  # Solo arranca cuando precompute_stats ha terminado correctamente.
  # En ejecuciones posteriores, precompute termina en ~1 min (stats cacheadas)
  # y training arranca normalmente.
  # ============================================================================
  meg_training_job:
    <<: *meg-base
    container_name: meg_training_job

    # ── Depende de precompute: espera a que termine con exit code 0 ────────────
    depends_on:
      precompute_stats:
        condition: service_completed_successfully

    # ── GPUs: las 2 RTX 6000 para DDP ─────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

    # ── Variables adicionales solo para DDP ───────────────────────────────────
    environment:
      - HF_TOKEN=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
      - HF_HOME=/workspace/cache/huggingface
      - XDG_CACHE_HOME=/workspace/cache
      - MPLCONFIGDIR=/workspace/cache/matplotlib
      - PNPL_CACHE_DIR=/workspace/cache/pnpl
      - UID=${UID:-1000}
      - GID=${GID:-1000}
      - MASTER_ADDR=localhost
      - MASTER_PORT=29500
      - NCCL_DEBUG=INFO
      - NCCL_DEBUG_SUBSYS=ALL
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - CUDA_VISIBLE_DEVICES=0,1

    # ── Comando: torchrun lanza DDP con 2 procesos (uno por GPU) ──────────────
    command: >
      train_ddp.py
      --task phoneme
      --backbone resnet18
      --strategy partial_ft
      --n_epochs 30
      --batch_size 256
      --num_workers 12
      --data_path /workspace/libribrain_data
      --output_dir /workspace/results
      --checkpoint_dir /workspace/checkpoints
      --checkpoint_every 1
      --resume_from none

    # ── Red y memoria compartida para NCCL/DDP ────────────────────────────────
    network_mode: host
    ipc: host

    # ── Parada limpia: SIGTERM activa el guardado del checkpoint ──────────────
    stop_signal: SIGTERM
    stop_grace_period: 120s     # 2 min para guardar checkpoint antes de SIGKILL

    restart: "no"
