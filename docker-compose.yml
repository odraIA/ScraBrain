              device_ids: ["${EEG_GPU:-0}"]
              capabilities: [gpu]

  eeg_sweep:
    <<: *eegxl-base
    container_name: scrabrain_eeg_sweep
    environment:
      <<: *eegxl-env
      NVIDIA_VISIBLE_DEVICES: "0,1"
    command: >
      bash -lc 'uv run --no-sync python scripts/run_eeg_sweep.py --continue-on-error'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1"]
              capabilities: [gpu]

  eeg_chained_sweep:
    <<: *eegxl-base
    container_name: scrabrain_eeg_chained_sweep
    environment:
      <<: *eegxl-env
      NVIDIA_VISIBLE_DEVICES: ${EEG_GPU:-0}
