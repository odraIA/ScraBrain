  eval_gwilliams:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_gwilliams
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${GWILLIAMS_GPU:-0}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_gwilliams
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${GWILLIAMS_ROOT}"
      hydra.run.dir="./logs/hydra/eval_gwilliams/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GWILLIAMS_GPU:-0}"]
