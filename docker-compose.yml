x-megxl-eval-env: &megxl-eval-env
  CRISS_CROSS_CHECKPOINT: ${CRISS_CROSS_CHECKPOINT:-./checkpoints/baseline/meg-xl-med.ckpt}
  HDF5_USE_FILE_LOCKING: "FALSE"
  HF_HOME: /workspace/hf_cache
  HF_TOKEN: ${HF_TOKEN:-}
  HYDRA_FULL_ERROR: "1"
  ARMENI_ROOT: ${ARMENI_ROOT:-./datasets/armeni}
  GWILLIAMS_ROOT: ${GWILLIAMS_ROOT:-./datasets/gwilliams}
  LIBRIBRAIN_ROOT: ${LIBRIBRAIN_ROOT:-./datasets/libribrain}
  ZUCO_ROOT: ${ZUCO_ROOT:-./datasets/zuco2/data/zuco2}
  ZUCO_EEG_SENSOR_TYPE: ${ZUCO_EEG_SENSOR_TYPE:-eeg}
  MPLCONFIGDIR: /workspace/hf_cache/matplotlib
  OMP_NUM_THREADS: ${OMP_NUM_THREADS:-8}
  TOKENIZERS_PARALLELISM: "false"
  TRANSFORMERS_CACHE: /workspace/hf_cache/transformers
  UV_PROJECT_ENVIRONMENT: /opt/venv
  WANDB_API_KEY: ${WANDB_API_KEY:-}
  WANDB_DIR: /workspace/wandb
  WANDB_MODE: ${WANDB_MODE:-offline}

x-megxl-eval-base: &megxl-eval-base
  build:
    context: .
    dockerfile: Dockerfile
  image: scrabrain-megxl:latest
  working_dir: /workspace
  init: true
  shm_size: "${SHM_SIZE:-64gb}"
  volumes:
    - .:/workspace
    - ${DATASETS_DIR:-./datasets}:/workspace/datasets:ro
    - ${CHECKPOINTS_DIR:-./checkpoints}:/workspace/checkpoints
    - ./logs:/workspace/logs
    - ./data:/workspace/data
    - ./embeddings_cache:/workspace/embeddings_cache
    - ./hf_cache:/workspace/hf_cache
    - ./wandb:/workspace/wandb
  environment: *megxl-eval-env

services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrabrain-megxl:latest
    container_name: scrabrain_monitor
    working_dir: /workspace
    init: true
    ports:
      - "${MONITOR_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - ${DATASETS_DIR:-./datasets}:/workspace/datasets:ro
      - ${CHECKPOINTS_DIR:-./checkpoints}:/workspace/checkpoints:ro
      - ./logs:/workspace/logs:ro
      - ./data:/workspace/data:ro
      - ./embeddings_cache:/workspace/embeddings_cache:ro
      - ./hf_cache:/workspace/hf_cache:ro
      - ./wandb:/workspace/wandb:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      BASE_DIR: /workspace
      DOCKER_SOCKET: /var/run/docker.sock
      PYTHONUNBUFFERED: "1"
    command: >
      bash -lc 'uv run --no-sync python monitor_server.py
      --host 0.0.0.0
      --port 8080
      --base-dir /workspace'

  eval_libribrain:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_libribrain
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${EVAL_GPU:-0}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_libribrain
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${LIBRIBRAIN_ROOT}"
      hydra.run.dir="./logs/hydra/eval_libribrain/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${EVAL_GPU:-0}"]
              capabilities: [gpu]

  eval_armeni:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_armeni
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${ARMENI_GPU:-0}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_armeni
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${ARMENI_ROOT}"
      hydra.run.dir="./logs/hydra/eval_armeni/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ARMENI_GPU:-0}"]
              capabilities: [gpu]

  eval_gwilliams:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_gwilliams
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${GWILLIAMS_GPU:-0}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_gwilliams
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${GWILLIAMS_ROOT}"
      hydra.run.dir="./logs/hydra/eval_gwilliams/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GWILLIAMS_GPU:-0}"]
              capabilities: [gpu]

  eval_zuco:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_zuco
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${ZUCO_GPU:-0}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_zuco
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${ZUCO_ROOT}"
      data.eeg_sensor_type="$${ZUCO_EEG_SENSOR_TYPE}"
      logging.experiment_name="criss-cross-word-classification-zuco-nr-50Hz-$${ZUCO_EEG_SENSOR_TYPE}"
      logging.save_dir="./logs/word_classification_zuco_$${ZUCO_EEG_SENSOR_TYPE}"
      logging.checkpoint_dir="./checkpoints/word_classification_zuco_$${ZUCO_EEG_SENSOR_TYPE}"
      hydra.run.dir="./logs/hydra/eval_zuco_$${ZUCO_EEG_SENSOR_TYPE}/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ZUCO_GPU:-0}"]
              capabilities: [gpu]

  eval_libribrain_linear_probe:
    <<: *megxl-eval-base
    container_name: scrabrain_eval_libribrain_linear_probe
    environment:
      <<: *megxl-eval-env
      NVIDIA_VISIBLE_DEVICES: ${LINEAR_PROBE_GPU:-1}
    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification_linear_probe
      --config-name=eval_criss_cross_word_classification_linear_probe_libribrain
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${LIBRIBRAIN_ROOT}"
      hydra.run.dir="./logs/hydra/eval_libribrain_linear_probe/$$(date +%Y%m%d_%H%M%S)"'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${LINEAR_PROBE_GPU:-1}"]
              capabilities: [gpu]
