    command: >
      bash -lc 'uv run --no-sync python -m brainstorm.evaluate_criss_cross_word_classification
      --config-name=eval_criss_cross_word_classification_zuco
      model.criss_cross_checkpoint="$${CRISS_CROSS_CHECKPOINT}"
      data.root="$${ZUCO_ROOT}"
      data.eeg_sensor_type="$${ZUCO_EEG_SENSOR_TYPE}"
      logging.experiment_name="criss-cross-word-classification-zuco-nr-50Hz-$${ZUCO_EEG_SENSOR_TYPE}"
      logging.save_dir="./logs/word_classification_zuco_$${ZUCO_EEG_SENSOR_TYPE}"
      logging.checkpoint_dir="./checkpoints/word_classification_zuco_$${ZUCO_EEG_SENSOR_TYPE}"
      hydra.run.dir="./logs/hydra/eval_zuco_$${ZUCO_EEG_SENSOR_TYPE}/$$(date +%Y%m%d_%H%M%S)"'
