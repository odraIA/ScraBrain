# ==============================================================================
# docker-compose.yml — Lanzamiento seguro en servidor compartido
# ==============================================================================
# Uso:
#   # Primera vez (construye imagen + precalcula stats + entrena):
#   docker compose up --build
#
#   # Ejecuciones posteriores (stats ya cacheadas, salta precompute rápido):
#   docker compose up
#
#   # Solo precalcular stats (sin training):
#   docker compose up precompute_stats
#
#   # Solo entrenar (si stats ya están calculadas):
#   docker compose up meg_training_job
#
#   # Ver logs del training en tiempo real:
#   docker compose logs -f meg_training_job
#
#   # Parar limpiamente (guarda checkpoint antes de morir):
#   docker compose down
#
#   # Lanzar solo el monitor (sin training):
#   docker compose up monitor
#   → Acceso en: http://<ip-servidor>:8080
#
# Requisitos del host:
#   - nvidia-container-toolkit instalado
#   - docker >= 23.0
#   - docker compose >= 2.0
# ==============================================================================

# Bloque de configuración reutilizable (ancla YAML)
x-meg-base: &meg-base
  build:
    context: .
    dockerfile: Dockerfile
    cache_from:
      - type=local,src=/tmp/.buildx-cache
    args:
      BUILDKIT_INLINE_CACHE: "1"

  volumes:
    - ./:/workspace:rw
    - scrabrain_uv_venv:/workspace/.venv:rw
    - ./libribrain_data:/workspace/libribrain_data:rw
    - ./checkpoints:/workspace/checkpoints:rw
    - ./results:/workspace/results:rw
    - ./logs:/workspace/logs:rw
    - ./hf_cache:/workspace/cache:rw

  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HF_DATASET=pnpl/LibriBrain
    - HF_HOME=/workspace/cache/huggingface
    - XDG_CACHE_HOME=/workspace/cache
    - MPLCONFIGDIR=/workspace/cache/matplotlib
    - PNPL_CACHE_DIR=/workspace/cache/pnpl
    - UV_PROJECT_ENVIRONMENT=/workspace/.venv
    - VIRTUAL_ENV=/workspace/.venv
    - UID=${UID:-1000}
    - GID=${GID:-1000}

  security_opt:
    - no-new-privileges:true
  read_only: false
  cap_drop:
    - ALL
  cap_add:
    - SYS_PTRACE
  init: true

  logging:
    driver: "json-file"
    options:
      max-size: "500m"
      max-file: "5"

  user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"


services:

  # ============================================================================
  # SERVICIO 1: Precálculo de stats de normalización
  # ============================================================================
  precompute_stats:
    <<: *meg-base
    container_name: meg_precompute_stats
    entrypoint: ["python"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    command: >
      /workspace/precompute_stats.py
        --data_path /workspace/libribrain_data
        --task phoneme

    restart: "no"
    ipc: "private"
    network_mode: host
    stop_grace_period: 30s


  # ============================================================================
  # SERVICIO 2: Entrenamiento DDP multi-GPU
  # ============================================================================
  meg_training_job:
    <<: *meg-base
    container_name: meg_training_job
    entrypoint: ["torchrun", "--nproc_per_node=${TRAIN_GPUS:-2}", "--nnodes=1"]

    depends_on:
      precompute_stats:
        condition: service_completed_successfully

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${TRAIN_GPUS:-2}
              capabilities: [gpu]

    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_DATASET=pnpl/LibriBrain
      - HF_HOME=/workspace/cache/huggingface
      - XDG_CACHE_HOME=/workspace/cache
      - MPLCONFIGDIR=/workspace/cache/matplotlib
      - PNPL_CACHE_DIR=/workspace/cache/pnpl
      - UV_PROJECT_ENVIRONMENT=/workspace/.venv
      - VIRTUAL_ENV=/workspace/.venv
      - UID=${UID:-1000}
      - GID=${GID:-1000}
      - MASTER_ADDR=localhost
      - MASTER_PORT=29500
      - NCCL_DEBUG=WARNING
      - NCCL_DEBUG_SUBSYS=ALL
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - CUDA_VISIBLE_DEVICES=${TRAIN_CUDA_VISIBLE_DEVICES:-0,1}

    command: >
      train_ddp.py
      --task phoneme
      --backbone resnet18
      --strategy partial_ft
      --n_epochs ${TRAIN_EPOCHS:-30}
      --batch_size ${TRAIN_BATCH_SIZE:-256}
      --eval_batch_size ${TRAIN_EVAL_BATCH_SIZE:-256}
      --n_freqs ${TRAIN_N_FREQS:-96}
      --num_workers ${TRAIN_NUM_WORKERS:-12}
      --eval_num_workers ${TRAIN_EVAL_NUM_WORKERS:-2}
      --data_path /workspace/libribrain_data
      --output_dir /workspace/results
      --checkpoint_dir /workspace/checkpoints
      --checkpoint_every 1
      --resume_from none

    network_mode: host
    ipc: host

    stop_signal: SIGTERM
    stop_grace_period: 120s
    restart: "no"


  # ============================================================================
  # SERVICIO 2B: Pretraining MEG-XL-style con sensor_mask
  # ============================================================================
  megxl_pretrain_job:
    <<: *meg-base
    container_name: megxl_pretrain_job
    entrypoint: ["python"]

    depends_on:
      precompute_stats:
        condition: service_completed_successfully

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${TRAIN_GPUS:-1}
              capabilities: [gpu]

    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_DATASET=pnpl/LibriBrain
      - HF_HOME=/workspace/cache/huggingface
      - XDG_CACHE_HOME=/workspace/cache
      - MPLCONFIGDIR=/workspace/cache/matplotlib
      - PNPL_CACHE_DIR=/workspace/cache/pnpl
      - UV_PROJECT_ENVIRONMENT=/workspace/.venv
      - VIRTUAL_ENV=/workspace/.venv
      - UID=${UID:-1000}
      - GID=${GID:-1000}
      - CUDA_VISIBLE_DEVICES=${TRAIN_CUDA_VISIBLE_DEVICES:-0}

    command: >
      /workspace/train_megxl_pretrain.py
      --datasets libribrain
      --task phoneme
      --max_channels ${MEGXL_MAX_CHANNELS:-306}
      --batch_size ${MEGXL_BATCH_SIZE:-128}
      --epochs ${MEGXL_EPOCHS:-5}
      --num_workers ${TRAIN_NUM_WORKERS:-12}
      --data_path /workspace/libribrain_data
      --output /workspace/checkpoints/megxl_pretrain.pt

    network_mode: host
    ipc: host
    restart: "no"


  # ============================================================================
  # SERVICIO 3: Shell interactiva para depuración
  # ============================================================================
  dev_shell:
    <<: *meg-base
    container_name: meg_dev_shell
    entrypoint: []
    command: ["tail", "-f", "/dev/null"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    network_mode: host
    ipc: host
    restart: "no"


  # ============================================================================
  # SERVICIO 4: Monitor de entrenamiento
  # ============================================================================
  # Dashboard web en tiempo real que muestra:
  #   - Estado de cada experimento del sweep (pending/running/done/failed)
  #   - Log en vivo del experimento seleccionado
  #   - Leaderboard con métricas de test de los experimentos completados
  #   - Uso de GPU en tiempo real (via nvidia-smi dentro del contenedor)
  #
  # Lanzamiento (independiente del training, arranca/para en cualquier momento):
  #   docker compose up -d monitor
  #   docker compose stop monitor
  #
  # Acceso:
  #   http://<ip-servidor>:8080
  #
  # No necesita GPU ni construir imagen pesada: usa python:3.11-slim.
  # Lee los volúmenes de logs/results/checkpoints en modo read-only.
  # ============================================================================
  monitor:
    image: python:3.11-slim
    container_name: meg_monitor
    restart: unless-stopped      # Se reinicia solo si se cae; parar con 'docker compose stop monitor'
    init: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # ── Montar proyecto completo en read-only para que el monitor vea:
    #    logs/results/checkpoints y sentinels (.precompute_*, .exp_done_*) ─────
    volumes:
      - ./:/workspace:ro

    # ── Exponer runtime NVIDIA para leer NVML/nvidia-smi si está disponible ───
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
    volumes_from: []             # Limpio, sin herencia del anchor

    environment:
      - BASE_DIR=/workspace
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility   # Solo nvidia-smi, sin CUDA completo

    # ── Instalar acceso NVML para stats de GPU y lanzar el servidor ───────────
    command: >
      sh -c "
        pip install --quiet --no-cache-dir nvidia-ml-py 2>/dev/null || true &&
        python /workspace/monitor_server.py --port 8080 --base-dir /workspace
      "

    # ── Puerto: 8080 en el host → 8080 en el contenedor ──────────────────────
    ports:
      - "8080:8080"

    # ── Solo monitorización: no usa CUDA para entrenar, solo telemetría GPU ───
    # Si NVML/nvidia-smi no está disponible en el contenedor, el monitor
    # simplemente oculta el strip de GPU.

    # ── Seguridad ──────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false

    # ── Logging ────────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

    # ── Healthcheck ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # ── El monitor NO depende del training para arrancar ──────────────────────
    # Puedes levantarlo antes, durante o después del sweep.

volumes:
  scrabrain_uv_venv:
