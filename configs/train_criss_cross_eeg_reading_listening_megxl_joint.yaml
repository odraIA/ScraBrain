# Fine-tune the MEG-XL checkpoint using all available EEG language datasets.
#
# EEG datasets inherited from train_criss_cross_eeg_reading_listening_continuous:
#   reading:  EEGDash NM000228 + ZuCo 2.0 NR
#   listening: ds004408 + ds007808 + SparrKULee
#
# No MEG recordings or LibriBrain batches are loaded during this training.

defaults:
  - train_criss_cross_eeg_reading_listening_continuous
  - _self_


data:
  mix_eeg_meg: false
  cache_dir: "./data/cache/eeg_reading_listening_megxl"

  # Filter at the source sampling rate and then resample to 50 Hz. Frequencies
  # above the final Nyquist frequency are removed by anti-alias filtering.
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0

  recording_subsample_prop: null
  shuffle_segments: false
  shuffle_segment_duration: 3.0


model:
  sampling_rate: 50
  num_sensor_types: 3

  # Load MEG-XL instead of starting from scratch. Its two-row GRAD/MAG sensor
  # table is expanded to GRAD/MAG/EEG and the MAG row initializes the EEG row.
  train_from_scratch: false
  criss_cross_checkpoint: ${oc.env:CRISS_CROSS_CHECKPOINT,./checkpoints/baseline/meg-xl-med.ckpt}
  initialize_eeg_from_meg: true
  eeg_meg_sensor_type_id: 1
  use_gradient_checkpointing: false


logging:
  experiment_name: "megxl-to-all-eeg-50hz-seed42"
  save_dir: "./logs/eeg_reading_listening_megxl"


checkpoint:
  save_dir: "./checkpoints/eeg_reading_listening_megxl"
  monitor: "val/loss"
  mode: "min"
  save_top_k: 1
  save_last: true
  every_n_train_steps: 5000


trainer:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  val_check_interval: 500


training:
  batch_size: 1
  num_epochs: 50
  max_steps: null
  learning_rate: 1.0e-4
  warmup_steps: 250
  gradient_clip_val: 1.0
  num_workers: 6
  pin_memory: true
  persistent_workers: true
  use_recording_sampler: true
  sampler_seed: 42
