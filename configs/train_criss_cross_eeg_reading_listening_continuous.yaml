# Joint continuous EEG pre-training with listening and reading datasets.
#
# Listening:
#   - OpenNeuro ds004408
#   - OpenNeuro ds007808
#   - SparrKULee
# Reading:
#   - EEGDash NM000228 (word-by-word RSVP)
#   - ZuCo 2.0 Natural Reading (NR only)
#
# This inherits the working continuous MEG-XL adaptation: 150 s contexts,
# complete non-overlapping physical-run windows, BioCodec at 50 Hz, masked
# RVQ-token prediction and the unchanged Criss-Cross Transformer.

defaults:
  - train_criss_cross_eeg_multi_continuous
  - _self_


datasets_config:
  - type: "openneuro_ds004408"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds004408"
    subjects: null
    sessions: null
    tasks: ["listening"]
    val_subjects: ["sub-017", "sub-018", "sub-019"]
    cover_all_samples: false
    short_stream_policy: "error"

  - type: "openneuro_ds007808"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds007808"
    subjects: null
    sessions: null
    tasks: ["listening", "listeningcovert"]
    val_sessions:
      - "ses-20240621"
      - "ses-20240624"
      - "ses-20240625"
      - "ses-20240626"
      - "ses-20240627"
      - "ses-20240628"
      - "ses-20240701"
      - "ses-20241119"
      - "ses-20241227"
    listeningcovert_policy: "full_recording_listening_targets"
    listening_trial_type: "listening"
    listening_interval_start: "onset"
    group_listeningcovert_by: "recording"
    merge_gap_seconds: 0.0
    cover_all_samples: false
    short_stream_policy: "error"

  - type: "sparrkulee"
    data_root: "/workspace/datasets/sparrkulee"
    subjects: null
    sessions: null
    tasks: ["listeningActive"]
    val_subjects:
      - "sub-101"
      - "sub-102"
      - "sub-103"
      - "sub-104"
      - "sub-105"
    cover_all_samples: false
    short_stream_policy: "error"

  - type: "eegdash"
    # The downloader accepts this parent directory and creates nm000228 below it.
    data_root: "/workspace/datasets/eegdash/data"
    subjects: null
    sessions: null
    tasks: ["delong", "control"]
    split_axis: "subject"
    val_fraction: 0.10
    split_seed: 42
    cover_all_samples: false
    short_stream_policy: "error"

  - type: "zuco"
    # The loader resolves either this project directory or data/zuco2 directly.
    data_root: "/workspace/datasets/zuco2"
    subjects: null
    sessions: null
    tasks: ["NR"]
    split_axis: "subject"
    val_fraction: 0.15
    split_seed: 42
    cover_all_samples: false
    short_stream_policy: "error"


data:
  task_mode: "reading_listening"
  cache_dir: "./data/cache/eeg_reading_listening_continuous"
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
  allow_missing_word_alignment: true
  max_channel_dim: null
  infer_max_channel_dim: true


model:
  tokenizer_name: "biocodec"
  tokenizer_variant: "default"
  tokenizer_checkpoint: "./brainstorm/neuro_tokenizers/biocodec_ckpt.pt"
  tokenizer_ckpt: "./brainstorm/neuro_tokenizers/biocodec_ckpt.pt"
  tokenizer_config_path: null
  vocab_size: 256
  num_quantizers: 6
  num_quantizers_used: 6
  tokenizer_downsample_ratio: 12
  overlap_ratio: 0.0
  sampling_rate: 50
  train_from_scratch: true
  use_promoted_checkpoint: false
  promoted_checkpoint: null
  num_sensor_types: 3
  use_gradient_checkpointing: false


logging:
  experiment_name: "criss-cross-eeg-continuous-reading-listening-50hz-biocodec-scratch-seed42"
  save_dir: "./logs/eeg_reading_listening_training"


checkpoint:
  save_dir: "./checkpoints/eeg_reading_listening_training"


trainer:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  val_check_interval: 500


training:
  batch_size: 1
  num_epochs: 50
  max_steps: null
  learning_rate: 1.0e-4
  warmup_steps: 250
  gradient_clip_val: 1.0
  num_workers: 6
  pin_memory: true
  persistent_workers: true
  use_recording_sampler: true
  sampler_seed: 42
