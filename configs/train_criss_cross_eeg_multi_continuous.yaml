# Continuous EEG pre-training configuration.
#
# It inherits the architecture, optimizer, frequency experiments, logging and
# trainer settings from train_criss_cross_eeg_multi_feq.yaml, but replaces the
# word-aligned loaders with continuous neural-signal segmentation.

defaults:
  - train_criss_cross_eeg_multi_feq
  - _self_

datasets_config:
  - type: "openneuro_ds004408"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds004408"
    subjects: null
    sessions: null
    tasks: ["listening"]
    val_subjects: ["sub-017", "sub-018", "sub-019"]

    # task-listening is already a listening recording, so use all samples.
    cover_all_samples: true
    short_stream_policy: "repeat"

  - type: "openneuro_ds007808"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds007808"
    subjects: null
    sessions: null
    tasks: ["listening", "listeningcovert"]
    val_sessions:
      - "ses-20240621"
      - "ses-20240624"
      - "ses-20240625"
      - "ses-20240626"
      - "ses-20240627"
      - "ses-20240628"
      - "ses-20240701"
      - "ses-20241119"
      - "ses-20241227"

    # For task-listeningcovert, keep every interval labelled listening and
    # exclude all intervals labelled covert.
    listeningcovert_policy: "listening_only"
    listening_trial_type: "listening"

    # "onset" preserves 100% of each event labelled listening. To start at the
    # actual audio onset instead, change this to "wav_onset".
    listening_interval_start: "onset"

    # Combine runs from the same subject/session into one listening-only stream.
    group_listeningcovert_by: "subject_session"

    # The last 150 s window overlaps the previous one when a remainder exists,
    # so no selected listening sample is discarded.
    cover_all_samples: true

    # Only used if an entire grouped listening stream is shorter than 150 s.
    # It repeats real listening samples instead of introducing zero padding.
    short_stream_policy: "repeat"
    merge_gap_seconds: 0.0

  - type: "sparrkulee"
    data_root: "/workspace/datasets/sparrkulee"
    subjects: null
    sessions: null
    tasks: ["listeningActive"]

    # Keep subjects entirely disjoint between train and validation. These five
    # subjects are present in the downloaded varyingStories12 cohort.
    val_subjects:
      - "sub-101"
      - "sub-102"
      - "sub-103"
      - "sub-104"
      - "sub-105"

    # SparrKULee recordings are continuous active listening runs. The loader
    # also supports the .bdf.gz files used by older sessions and removes the
    # temporary decompressed BDF after creating the 50 Hz cache.
    cover_all_samples: true
    short_stream_policy: "repeat"

data:
  task_mode: "listening"
  cache_dir: "./data/cache/eeg_continuous"
  segment_length: 150.0
  subsegment_duration: 3.0

  # These two values remain because the inherited training entrypoint passes
  # them, but the continuous DataModule intentionally ignores them.
  words_per_segment: 50
  window_onset_offset: -0.5
  allow_missing_word_alignment: true

model:
  # Usa más VRAM, pero evita recomputar activaciones durante el backward.
  use_gradient_checkpointing: false

logging:
  experiment_name: "criss-cross-eeg-continuous-listening-sparrkulee-50hz"
  save_dir: "./logs/eeg_continuous_training"

checkpoint:
  save_dir: "./checkpoints/eeg_continuous_training"

trainer:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  val_check_interval: 500

training:
  gradient_clip_val: 1.0
