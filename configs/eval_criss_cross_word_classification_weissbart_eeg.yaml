# CrissCross Word Classification Fine-Tuning - Weissbart Continuous Listening EEG

model:
  # false: fine-tune the pretrained MEG-XL model; true: train from scratch
  train_from_scratch: false
  criss_cross_checkpoint: "./checkpoints/baseline/meg-xl-med.ckpt"
  use_promoted_checkpoint: false
  promoted_checkpoint: null

  tokenizer_name: "biocodec"
  tokenizer_checkpoint: "./brainstorm/neuro_tokenizers/biocodec_ckpt.pt"

  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1

data:
  dataset_type: "weissbart_eeg"
  dataset_name: "weissbart_eeg"
  task_mode: "listening"

  # The loader also accepts a parent containing WeissbartSurprisal/.
  root: "./datasets/WeissbartEEG"
  cache_dir: "./data/cache/weissbart_eeg_word_aligned"

  # Weissbart was recorded with 64 EEG channels.
  max_channel_dim: 64

  # Reuse MEG-XL's pretrained gradiometer sensor-type embedding. Change to
  # "eeg" only when deliberately adding/fine-tuning a separate EEG embedding.
  eeg_sensor_type: "grad"

  # All participants are loaded. The same 50-word text segment is always placed
  # in only one split, so repeated stories across subjects do not leak.
  subjects: null
  sessions: null
  tasks: null
  use_hashed_split: true
  split_group: "sentence"
  split_ratios: [0.8, 0.1, 0.1]

  # Kept for evaluator compatibility; unused when use_hashed_split=true.
  all_sessions: null
  train_pct: 0.25
  train_sessions: null
  val_sessions: null
  test_sessions: null

  # Same preprocessing and word-window layout used by MEG-XL fine-tuning.
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5

t5:
  model_name: "t5-large"
  layer: 12
  cache_dir: "./embeddings_cache"

training:
  batch_size: 1
  num_epochs: 50
  resume_checkpoint: null

  criss_cross_lr: 1.0e-5
  word_mlp_lr: 1.0e-3
  from_scratch_lr: 1.0e-4
  weight_decay: 1.0e-4
  gradient_clip_val: 1.0

  patience: 10
  min_delta: 0.001

  # The dataset keeps HDF5 handles open, matching the MEG-XL loaders.
  num_workers: 0
  pin_memory: true

loss:
  norm_kind: "xy"
  temperature: true
  bias: true
  reduction: "sum"

evaluation:
  retrieval_set_sizes: [50, 250]
  k: 10

logging:
  wandb_project: "brainstorm-eeg-eval"
  experiment_name: "criss-cross-word-classification-weissbart-eeg-50Hz-biocodec-pretrained"
  log_every_n_steps: 10
  save_dir: "./logs/word_classification_weissbart_eeg"
  checkpoint_dir: "./checkpoints/word_classification_weissbart_eeg"

device: "cuda"
seed: 42
