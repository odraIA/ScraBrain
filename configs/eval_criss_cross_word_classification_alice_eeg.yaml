# CrissCross Word Classification Fine-Tuning - Alice Continuous Listening EEG

model:
  # false: fine-tune a supplied EEG/MEG-XL checkpoint; true: random weights
  train_from_scratch: false
  criss_cross_checkpoint: "./checkpoints/baseline/meg-xl-med.ckpt"
  use_promoted_checkpoint: false
  promoted_checkpoint: null

  tokenizer_name: "biocodec"
  tokenizer_checkpoint: "./brainstorm/neuro_tokenizers/biocodec_ckpt.pt"

  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1

data:
  dataset_type: "alice_eeg"
  dataset_name: "alice_eeg"
  task_mode: "listening"

  root: "./datasets/alice_eeg"
  cache_dir: "./data/cache/alice_eeg_word_aligned"

  # Alice contains 61 scalp EEG channels plus auxiliary channels in some files.
  # The loader removes VEOG/AUD and pads the remaining EEG channels to 64.
  max_channel_dim: 64

  # Reuse MEG-XL's pretrained gradiometer type embedding, as in the Weissbart
  # transfer experiment. Set to "eeg" only when deliberately training a new
  # sensor-type row.
  eeg_sensor_type: "grad"

  # "main" is the N=33 set used in the original Brennan/Hale analysis.
  # Alternatives: all, low_perf, high_noise, or an explicit subjects list.
  subject_selection: "main"
  subjects: null
  sessions: null
  tasks: null

  # All participants heard the identical chapter. Splitting by the shared
  # 50-word text sequence prevents repetitions from leaking across splits.
  use_hashed_split: true
  split_group: "sentence"
  split_ratios: [0.8, 0.1, 0.1]

  all_sessions: null
  train_pct: 1.0
  train_sessions: null
  val_sessions: null
  test_sessions: null

  # Same preprocessing and word-window layout as the Weissbart experiment.
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5

t5:
  model_name: "t5-large"
  layer: 12
  cache_dir: "./embeddings_cache"

training:
  batch_size: 1
  num_epochs: 50
  resume_checkpoint: null

  criss_cross_lr: 1.0e-5
  word_mlp_lr: 1.0e-3
  from_scratch_lr: 1.0e-4
  weight_decay: 1.0e-4
  gradient_clip_val: 1.0

  patience: 10
  min_delta: 0.001
  num_workers: 0
  pin_memory: true

  mixed_precision: true
  amp_dtype: "bfloat16"
  gradient_checkpointing: false
  features_only_forward: true
  matmul_precision: "high"
  allow_tf32: true

loss:
  norm_kind: "xy"
  temperature: true
  bias: true
  reduction: "sum"

evaluation:
  # 50/250 reproduce the MEG-XL protocol. 601 enables direct comparison with
  # Chen et al.; their paper reports validation Top-1=4.10% and Top-10=26.82%.
  retrieval_set_sizes: [50, 250, 601]
  k: 10
  evaluate_test_during_training: false

logging:
  wandb_project: "brainstorm-eeg-eval"
  experiment_name: "criss-cross-word-classification-alice-eeg-50Hz-biocodec-pretrained"
  log_every_n_steps: 10
  save_dir: "./logs/word_classification_alice_eeg"
  checkpoint_dir: "./checkpoints/word_classification_alice_eeg"

device: "cuda"
seed: 42
