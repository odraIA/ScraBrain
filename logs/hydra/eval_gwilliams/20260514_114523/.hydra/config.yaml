model:
  train_from_scratch: false
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1
data:
  dataset_type: gwilliams
  root: ./datasets/gwilliams
  cache_dir: ./data/cache
  max_channel_dim: 208
  subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-04
  - sub-05
  - sub-06
  - sub-07
  - sub-08
  - sub-09
  - sub-10
  - sub-11
  - sub-12
  - sub-13
  - sub-14
  - sub-15
  - sub-16
  - sub-17
  - sub-18
  - sub-19
  - sub-20
  - sub-21
  - sub-22
  - sub-23
  - sub-24
  - sub-25
  - sub-26
  - sub-27
  use_hashed_split: true
  split_ratios:
  - 0.8
  - 0.1
  - 0.1
  all_sessions:
  - ses-0
  - ses-1
  train_pct: 0.25
  train_sessions:
  - ses-0
  val_sessions:
  - ses-1
  test_sessions:
  - ses-1
  tasks:
  - '0'
  - '1'
  - '2'
  - '3'
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
t5:
  model_name: t5-large
  layer: 12
  cache_dir: ./embeddings_cache
training:
  batch_size: 1
  num_epochs: 50
  criss_cross_lr: 1.0e-05
  word_mlp_lr: 0.001
  from_scratch_lr: 0.0001
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  patience: 10
  min_delta: 0.001
  num_workers: 6
  pin_memory: true
loss:
  norm_kind: xy
  temperature: true
  bias: true
  reduction: sum
evaluation:
  retrieval_set_sizes:
  - 50
  - 250
  k: 10
logging:
  wandb_project: brainstorm-eval
  experiment_name: criss-cross-word-classification-gwilliams-50Hz
  log_every_n_steps: 10
  save_dir: ./logs/word_classification_gwilliams
device: cuda
seed: 42
