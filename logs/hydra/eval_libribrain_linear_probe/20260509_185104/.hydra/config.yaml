model:
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  linear_probe:
    embed_dim: 1024
data:
  dataset_type: libribrain
  root: ./datasets/libribrain
  cache_dir: ./data/cache
  max_channel_dim: 306
  subjects:
  - sub-0
  use_hashed_split: true
  split_ratios:
  - 0.8
  - 0.1
  - 0.1
  all_sessions:
  - ses-1
  - ses-2
  - ses-3
  - ses-4
  - ses-5
  - ses-6
  - ses-7
  - ses-8
  - ses-9
  - ses-10
  train_pct: 0.25
  train_sessions:
  - ses-1
  - ses-2
  - ses-3
  - ses-4
  - ses-5
  - ses-6
  - ses-7
  - ses-8
  val_sessions:
  - ses-9
  test_sessions:
  - ses-10
  tasks: null
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
t5:
  model_name: t5-large
  layer: 12
  cache_dir: ./embeddings_cache
training:
  batch_size: 1
  num_epochs: 50
  probe_lr: 0.001
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  patience: 10
  min_delta: 0.001
  num_workers: 6
  pin_memory: true
loss:
  norm_kind: xy
  temperature: true
  bias: true
  reduction: sum
evaluation:
  retrieval_set_sizes:
  - 50
  - 250
  k: 10
logging:
  wandb_project: brainstorm-eval
  experiment_name: criss-cross-word-classification-linear-probe-libribrain
  log_every_n_steps: 10
  save_dir: ./logs/word_classification_linear_probe_libribrain
device: cuda
seed: 42
