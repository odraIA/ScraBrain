model:
  train_from_scratch: false
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1
data:
  dataset_type: zuco
  root: ./datasets/zuco2/data/zuco2
  cache_dir: ./data/cache/zuco
  max_channel_dim: 105
  eeg_sensor_type: meg
  subjects:
  - YAC
  - YAG
  - YAK
  - YDG
  - YDR
  - YFR
  - YFS
  - YHS
  - YIS
  - YLS
  - YMD
  - YMS
  - YRH
  - YRK
  - YRP
  - YSD
  - YSL
  - YTL
  use_hashed_split: true
  split_ratios:
  - 0.8
  - 0.1
  - 0.1
  all_sessions:
  - NR1
  - NR2
  - NR3
  - NR4
  - NR5
  - NR6
  - NR7
  train_pct: 0.25
  train_sessions:
  - NR1
  - NR2
  - NR3
  - NR4
  - NR5
  val_sessions:
  - NR6
  test_sessions:
  - NR7
  tasks:
  - NR
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
t5:
  model_name: t5-large
  layer: 12
  cache_dir: ./embeddings_cache
training:
  batch_size: 1
  num_epochs: 50
  resume_checkpoint: null
  criss_cross_lr: 1.0e-05
  word_mlp_lr: 0.001
  from_scratch_lr: 0.0001
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  patience: 10
  min_delta: 0.001
  num_workers: 0
  pin_memory: true
loss:
  norm_kind: xy
  temperature: true
  bias: true
  reduction: sum
evaluation:
  retrieval_set_sizes:
  - 50
  - 250
  k: 10
logging:
  wandb_project: brainstorm-eval
  experiment_name: criss-cross-word-classification-zuco-nr-50Hz-meg
  log_every_n_steps: 10
  save_dir: ./logs/word_classification_zuco_meg
  checkpoint_dir: ./checkpoints/word_classification_zuco_meg
device: cuda
seed: 42
