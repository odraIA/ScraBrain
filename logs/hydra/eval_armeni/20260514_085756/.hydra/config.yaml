model:
  train_from_scratch: false
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1
data:
  dataset_type: armeni
  root: ./datasets/armeni
  cache_dir: ./data/cache
  subjects:
  - sub-001
  - sub-002
  - sub-003
  use_hashed_split: true
  split_ratios:
  - 0.8
  - 0.1
  - 0.1
  all_sessions:
  - ses-001
  - ses-002
  - ses-003
  - ses-004
  - ses-005
  - ses-006
  - ses-007
  - ses-008
  - ses-009
  - ses-010
  train_pct: 0.25
  train_sessions:
  - ses-001
  - ses-002
  - ses-003
  - ses-004
  - ses-005
  - ses-006
  - ses-007
  - ses-008
  val_sessions:
  - ses-009
  test_sessions:
  - ses-010
  tasks:
  - compr
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50.0
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
t5:
  model_name: t5-large
  layer: 12
  cache_dir: ./embeddings_cache
training:
  batch_size: 1
  num_epochs: 50
  resume_checkpoint: null
  criss_cross_lr: 1.0e-05
  word_mlp_lr: 0.001
  from_scratch_lr: 0.0001
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  patience: 10
  min_delta: 0.001
  num_workers: 6
  pin_memory: true
loss:
  norm_kind: xy
  temperature: true
  bias: true
  reduction: sum
evaluation:
  retrieval_set_sizes:
  - 50
  - 250
  k: 10
logging:
  wandb_project: brainstorm-eval
  experiment_name: criss-cross-word-classification-armeni-50Hz
  log_every_n_steps: 10
  save_dir: ./logs/word_classification_armeni
device: cuda
seed: 42
